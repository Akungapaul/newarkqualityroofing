<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#1A3A2A"/>
  <!-- Roof shape -->
  <path d="M30 135L90 32L150 135" stroke="#C17F4E" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Chimney -->
  <rect x="120" y="55" width="14" height="32" rx="2" fill="#C17F4E"/>
  <!-- Inner ridge highlight -->
  <path d="M54 100L90 42L126 100" stroke="#F5F0E8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.35"/>
  <!-- NQR letters -->
  <text x="90" y="162" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#F5F0E8" text-anchor="middle" letter-spacing="4" opacity="0.9">NQR</text>
</svg>
