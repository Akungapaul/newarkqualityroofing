<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 48" fill="none">
  <!-- Roof icon mark -->
  <g>
    <!-- Main roof shape -->
    <path d="M4 34L24 8L44 34" stroke="#C17F4E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Chimney -->
    <rect x="33" y="14" width="5" height="10" rx="0.5" fill="#C17F4E"/>
    <!-- Ridge cap accent -->
    <path d="M14 21L24 8L34 21" stroke="#F5F0E8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
    <!-- Base line -->
    <line x1="2" y1="38" x2="46" y2="38" stroke="#C17F4E" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Company name -->
  <text x="56" y="24" font-family="Georgia, 'Cormorant', serif" font-size="19" font-weight="700" fill="#F5F0E8" letter-spacing="0.5">
    Newark Quality Roofing
  </text>
  <!-- Tagline -->
  <text x="56" y="38" font-family="Georgia, 'Cormorant Garamond', serif" font-size="10" fill="#C17F4E" letter-spacing="2.5" font-weight="400">
    ESSEX COUNTY&apos;S TRUSTED ROOFER
  </text>
</svg>
